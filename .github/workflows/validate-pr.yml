name: Validate Pull Request

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'Solutions/**'
      - 'README.md'
      - '.github/workflows/validate-pr.yml'

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    name: Validate Solution Structure
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          # In pull_request_target, we must explicitly checkout the PR's head branch
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Validate directory naming convention
        run: |
          echo "Checking directory naming convention..."
          # Only check directories inside Solutions/
          for dir in Solutions/*/; do
            [ -e "$dir" ] || continue # Handle empty directory case
            dirname=$(basename "$dir")
            if ! [[ "$dirname" =~ ^[0-9]{4}-[A-Za-z0-9-]+$ ]]; then
              echo "❌ Directory name does not follow XXXX-Problem-Name format: $dirname"
              exit 1
            fi
          done
          echo "✅ All directories follow correct naming"

      - name: Validate solution file headers
        run: |
          echo "Validating solution file headers..."
          has_error=0
          git fetch origin main --quiet
          
          # Diff against the PR head to see what's actually changing
          changed_files=$(git diff --name-only origin/main...${{ github.event.pull_request.head.sha }} | grep '^Solutions/' | grep 'solution\.' || true)
          
          if [ -z "$changed_files" ]; then
            echo "ℹ️ No solution files changed"
            exit 0
          fi
          
          while IFS= read -r file; do
            if [ ! -f "$file" ]; then continue; fi # Skip deleted files
            echo "Checking: $file"
            for term in "Author" "Problem" "Time Complexity" "Space Complexity"; do
              if ! grep -iq "$term" "$file"; then
                echo "❌ Missing '$term' in: $file"
                has_error=1
              fi
            done
          done <<< "$changed_files"
          
          if [ $has_error -eq 1 ]; then exit 1; fi

  validate-readme:
    runs-on: ubuntu-latest
    name: Validate README Update
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check if README is updated
        run: |
          git fetch origin main --quiet
          changed_files=$(git diff --name-only origin/main...${{ github.event.pull_request.head.sha }})
          if echo "$changed_files" | grep -q '^Solutions/' && ! echo "$changed_files" | grep -q '^README.md'; then
            echo "❌ Solutions added but README.md not updated!"
            exit 1
          fi

  lint-python:
    runs-on: ubuntu-latest
    name: Lint Python
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install tools
        run: pip install flake8
      - name: Run Lint
        run: |
          python_files=$(find Solutions -name 'solution.py' -type f)
          if [ -n "$python_files" ]; then
            flake8 $python_files --max-line-length=100 || echo "⚠️ Linting warnings detected"
          fi

  lint-cpp:
    runs-on: ubuntu-latest
    name: Lint C++
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Install clang-format
        run: sudo apt-get update -qq && sudo apt-get install -y clang-format
      - name: Validate C++
        run: |
          cpp_files=$(find Solutions -name 'solution.cpp' -type f)
          for file in $cpp_files; do
            clang-format --dry-run --Werror "$file" || echo "⚠️ Formatting issues in $file"
          done

  check-no-sensitive-data:
    runs-on: ubuntu-latest
    name: Security Scan
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Scan for secrets
        run: |
          if grep -rEi "api_key|password|secret|private_key" Solutions/; then
            echo "❌ Sensitive data found!"
            exit 1
          else
            echo "✅ Security scan passed"
          fi

  final-check:
    runs-on: ubuntu-latest
    name: Final Results
    needs: [validate-structure, validate-readme, lint-python, lint-cpp, check-no-sensitive-data]
    if: always()
    steps:
      - name: Post Results to PR
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              structure: "${{ needs.validate-structure.result }}",
              readme: "${{ needs.validate-readme.result }}",
              python: "${{ needs.lint-python.result }}",
              cpp: "${{ needs.lint-cpp.result }}",
              security: "${{ needs.check-no-sensitive-data.result }}"
            };
            
            const allPassed = Object.values(results).every(status => status === 'success' || status === 'skipped');
            
            const body = allPassed 
              ? "### ✅ Validation Passed\n\nAll automated checks passed! A maintainer has been notified to review your solution."
              : "### ❌ Validation Failed\n\nOne or more automated checks failed. Please check the **Actions** tab, fix the errors, and push again.";
            
            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
            
            if (!allPassed) { core.setFailed("Workflow failed due to check failures."); }