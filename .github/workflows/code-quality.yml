name: Code Quality & Formatting

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'Solutions/**'
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-format-python:
    runs-on: ubuntu-latest
    name: Format Python Code
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install formatting tools
        run: |
          pip install black isort

      - name: Format Python files (optional)
        run: |
          python_files=$(find Solutions -name 'solution.py' -type f)
          
          if [ -z "$python_files" ]; then
            echo "ℹ️  No Python files to format"
            exit 0
          fi
          
          echo "📝 Auto-formatting Python files..."
          black $python_files --line-length=100 || echo "⚠️  Some formatting suggestions"
          isort $python_files --profile=black || echo "⚠️  Some import suggestions"
          
          echo "✅ Python formatting check complete"

      - name: Commit formatting changes (if any)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format Python code with black and isort"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"
          file_pattern: "Solutions/**/*.py"
          skip_dirty_check: true

  check-complexity:
    runs-on: ubuntu-latest
    name: Check Code Complexity
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install complexity checker
        run: |
          pip install radon

      - name: Check Python code complexity
        run: |
          echo "Analyzing code complexity..."
          python_files=$(find Solutions -name 'solution.py' -type f)
          
          if [ -z "$python_files" ]; then
            echo "ℹ️  No Python files to analyze"
            exit 0
          fi
          
          echo "Cyclomatic Complexity Analysis:"
          radon cc $python_files --average -s || true
          
          echo -e "\nMaintainability Index:"
          radon mi $python_files -s || true
          
          echo "✅ Complexity analysis complete"

  spell-check:
    runs-on: ubuntu-latest
    name: Spell Check
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install spell checker
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y aspell aspell-en

      - name: Spell check (informational only)
        run: |
          echo "Running spell check on code files..."
          
          found_errors=0
          for file in $(find Solutions -type f \( -name "*.py" -o -name "*.java" -o -name "*.cpp" -o -name "*.js" \)); do
            # Extract comments and strings for spell checking
            grep -oE '(#|//|/\*|\*/).*' "$file" 2>/dev/null | aspell -l en list | sort -u | while read word; do
              echo "⚠️  Possible misspelling in $file: $word"
              found_errors=$((found_errors + 1))
            done
          done
          
          echo "✅ Spell check complete (warnings only)"

  file-size-check:
    runs-on: ubuntu-latest
    name: Check File Sizes
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify file sizes (warning only)
        run: |
          echo "Checking solution file sizes..."
          
          max_size=$((500 * 1024))  # 500 KB in bytes
          
          while IFS= read -r file; do
            # Compatibility fix for stat command on linux
            size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null)
            filename=$(basename "$file")
            
            if [ $size -gt $max_size ]; then
              echo "⚠️  File is large: $filename ($((size / 1024)) KB) - consider optimizing"
            else
              echo "✅ $filename is acceptable size ($((size / 1024)) KB)"
            fi
          done < <(find Solutions -name 'solution.*' -type f)
          
          echo "✅ File size check complete"

  test-coverage-reminder:
    runs-on: ubuntu-latest
    name: Test Coverage Reminder
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for test cases (informational)
        run: |
          echo "Checking for test cases in solutions..."
          
          python_files=$(find Solutions -name 'solution.py' -type f)
          missing_tests=0
          
          while IFS= read -r file; do
            if ! grep -q "if __name__.*==.*['\"]__main__['\"]" "$file" && \
               ! grep -q "def test_" "$file"; then
              echo "💡 Tip: Consider adding test cases to: $file"
              missing_tests=$((missing_tests + 1))
            fi
          done <<< "$python_files"
          
          if [ $missing_tests -eq 0 ]; then
            echo "✅ All Python files contain test cases"
          else
            echo "⚠️  $missing_tests file(s) could benefit from test cases"
          fi

  documentation-check:
    runs-on: ubuntu-latest
    name: Documentation Check
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate documentation (informational)
        run: |
          # FIX: Reliable diffing
          git fetch origin main || true
          changed_files=$(git diff --name-only origin/main...HEAD 2>/dev/null | grep '^Solutions/' | grep 'solution\.' || echo "")
          
          if [ -z "$changed_files" ]; then
            echo "ℹ️  No solution files changed"
            exit 0
          fi
          
          required_sections=("Author" "Problem" "Time Complexity" "Space Complexity")
          
          while IFS= read -r file; do
            echo "Checking: $file"
            missing=0
            
            for section in "${required_sections[@]}"; do
              if ! grep -iq "$section" "$file"; then
                echo "  💡 Tip: Missing $section section"
                missing=$((missing + 1))
              fi
            done
            
            if [ $missing -gt 0 ]; then
              echo "  ⚠️  Consider adding missing sections"
            fi
          done <<< "$changed_files"
          
          echo "✅ Documentation check complete (no blocking issues)"